services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm-network

  migrator:
    image: postgres:15-alpine
    container_name: crm-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: crm_password
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: crm_user
      DATABASE_PASSWORD: crm_password
      DATABASE_NAME: crm_db
      DEV_SEED_ENABLED: "true"
      DEV_SEED_SQL: /app/dev-seed.sql
    volumes:
      - ../../db/migrations:/app/migrations:ro
      - ../../db/up.sh:/app/up.sh:ro
      - ../../db/dev-seed.sql:/app/dev-seed.sql:ro
    working_dir: /app
    command: ["sh", "/app/up.sh"]
    networks:
      - crm-network
    restart: "no"

  backend:
    build:
      context: ../../packages/backend
      dockerfile: Dockerfile.dev
    container_name: crm-backend
    ports:
      - "3000:3000"
    env_file:
      - ./.env.backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    depends_on:
      migrator:
        condition: service_completed_successfully
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - crm-network
    volumes:
      - ../../packages/backend:/app
      - /app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/docs >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ../../packages/frontend
      dockerfile: Dockerfile.dev
    container_name: crm-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./.env.frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    depends_on:
      backend:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - crm-network
    volumes:
      - ../../packages/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:

networks:
  crm-network:
    driver: bridge
